################################################################################
# FreeDi Installation Configuration
#
# This file contains configuration variables for the FreeDi installation script.
# These variables define paths and settings used throughout the installation.
#
# Variables FREEDI_DIR, USER_HOME_DIR, USER_NAME, and USER_GROUP are set by
# the install script and can be referenced here.
################################################################################

# FreeDi subdirectories
FREEDI_LCD_DIR="${FREEDI_DIR}/FreeDiLCD"                                                # FreeDiLCD directory
REPO_MODULE_DIR="${FREEDI_DIR}/klipper_module"                                          # klipper_module directory
LCD_FIRMWARE_DIR="${FREEDI_DIR}/screen_firmwares"                                       # screen_firmwares directory
WIFI_DIR="${FREEDI_DIR}/helpers/wifi"                                                   # wifi driver directory
DTBO_DIR="${FREEDI_DIR}/helpers/dtbo"                                                   # dtbo directory

# System service
SERVICE="FreeDi.service"                                                                # FreeDi systemd service

# External paths - Klipper
KLIPPER_DIR="${USER_HOME_DIR}/klipper"                                                  # klipper directory
KLIPPER_EXTRAS_DIR="${KLIPPER_DIR}/klippy/extras"                                       # klipper module directory
KLIPPER_ENV="${USER_HOME_DIR}/klippy-env"                                               # klipper virtual environment
KLIPPER_VENV_PYTHON_BIN="${KLIPPER_ENV}/bin/python"                                     # klipper python binary
MOONRAKER_DIR="${USER_HOME_DIR}/moonraker"                                              # moonraker directory
MAINSAIL_DIR="${USER_HOME_DIR}/mainsail"                                                # mainsail directory
CROWSNEST_DIR="$USER_HOME_DIR/crowsnest"                                                # crowsnest directory
TIMELAPSE_DIR="$USER_HOME_DIR/timelapse"                                                # timelapse directory

# External paths - Printer data
PRINTER_DATA_DIR="${USER_HOME_DIR}/printer_data"                                        # printer data directory
PRINTER_CONFIG_DIR="${PRINTER_DATA_DIR}/config"                                         # printer config directory
PRINTER_CONFIG="${PRINTER_CONFIG_DIR}/printer.cfg"                                      # printer config file
MOONRAKER_CONF="${PRINTER_CONFIG_DIR}/moonraker.conf"                                   # moonraker config file
MOONRAKER_ASVC="${PRINTER_DATA_DIR}/moonraker.asvc"                                     # moonraker.asvc file path

# Device tree binary overlay target (stock mainboard)
DTBO_TARGET=/boot/dtb/rockchip/overlay                                                  # dtbo target directory for stock mainboard

# Supported Python versions
SUPPORTED_PYTHON_VERSIONS=("3.11" "3.13" "3.14")                                        # Supported Python versions for FreeDi

################################################################################
# Don't edit below this line unless you know what you're doing.
# The variables above are meant to be customized for your setup. The code below
# uses those variables to perform the installation. Changing the code below may
# break the installation process if not done correctly.
################################################################################

# Create comma-separated list of supported versions for error messages
SUPPORTED_VERSIONS_JOINED=$(IFS=', '; echo "${SUPPORTED_PYTHON_VERSIONS[*]}")
