# Q1 Pro config created by Phil1988(github)/coco.33(discord) on 11.05.2025
# For more information check out my wiki: https://github.com/Phil1988/FreeDi/wiki
# Reviewed and improved - see CHANGELOG at the bottom of this file


#####################################################################
# Kinematics
#####################################################################
[printer]
kinematics: corexy
max_velocity: 600
max_accel: 20000
max_z_velocity: 10
max_z_accel: 500
square_corner_velocity: 8


#####################################################################
# Motherboard and periphery
#####################################################################
[temperature_sensor Mainboard_RK3328]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[mcu]
serial: /dev/ttyS0
restart_method: command
baud: 500000

[temperature_sensor Mainboard_STM32F402]
sensor_type: temperature_mcu
sensor_mcu: mcu

[mcu Toolhead]
serial: /dev/ttyS2
restart_method: command
baud: 500000

[temperature_sensor Toolhead_RP2040]
sensor_type: temperature_mcu
sensor_mcu: Toolhead
min_temp: 0
max_temp: 100


#####################################################################
# Features
#####################################################################
[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]

[display_status]
[exclude_object]

[idle_timeout]
timeout: 5400   ; 90min timeout

# FIX: Resolution reduced from 1.0mm to 0.1mm — at 1mm, arcs are interpolated
#      as 1mm flat segments, producing visible faceting on circular perimeters.
[gcode_arcs]
resolution: 0.1

[force_move]
enable_force_move: True

[respond]
default_type: echo


#####################################################################
# FreeDi
#####################################################################
[include freedi.cfg]


#####################################################################
# Macros
#####################################################################
[include macros.cfg]


#####################################################################
# Input shaping
#####################################################################
[resonance_tester]
accel_chip: adxl345
probe_points:
    120, 120, 10
accel_per_hz: 75
sweeping_period: 0
max_smoothing: 0.5

[adxl345]
cs_pin: Toolhead:gpio13
spi_software_sclk_pin: Toolhead:gpio14
spi_software_mosi_pin: Toolhead:gpio15
spi_software_miso_pin: Toolhead:gpio12
axes_map: -x, z, -y

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 53.6
shaper_type_y: mzv
shaper_freq_y: 50.8


#####################################################################
# Hotend
#####################################################################
[extruder]
step_pin: Toolhead:gpio5
dir_pin: Toolhead:gpio4
enable_pin: !Toolhead:gpio10
rotation_distance: 53.7
gear_ratio: 1517:170
microsteps: 16
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.75
min_temp: 0
max_temp: 360
min_extrude_temp: 170
smooth_time: 2
step_pulse_duration: 0.000002

heater_pin: Toolhead:gpio24
sensor_type: MAX6675
sensor_pin: Toolhead:gpio17
max_power: 1.0
#control: pid
#pid_Kp: 24.737
#pid_Ki: 10.994
#pid_Kd: 13.915

spi_speed: 100000
spi_software_sclk_pin: Toolhead:gpio18
spi_software_mosi_pin: Toolhead:gpio19
spi_software_miso_pin: Toolhead:gpio16

pressure_advance: 0.032
pressure_advance_smooth_time: 0.03
max_extrude_cross_section: 500
instantaneous_corner_velocity: 10.000
max_extrude_only_distance: 500.0
max_extrude_only_velocity: 5000
max_extrude_only_accel: 2000

[verify_heater extruder]
max_error: 120
check_gain_time: 20
hysteresis: 5
heating_gain: 1


#####################################################################
# Heated bed
#####################################################################
[heater_bed]
heater_pin: PB10
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PA0
max_power: 1.0
#control: pid
#pid_kp: 64.431
#pid_ki: 2.845
#pid_kd: 364.839
min_temp: -50
max_temp: 125
pwm_cycle_time: 0.02   # for 50Hz line power
#pwm_cycle_time: 0.016 # for 60Hz line power

[verify_heater heater_bed]
max_error: 200
check_gain_time: 360
hysteresis: 5
heating_gain: 1


#####################################################################
# Bed mesh
# CHANGES vs original:
#   mesh_pps: 4,4 → 2,2
#     Less over-interpolation between probe points on a relatively
#     flat bed. 4,4 can amplify noise into phantom dips/bumps.
#
#   fade_start/fade_end/fade_target added
#     Mesh correction is blended out between 0.4mm and 5.0mm Z,
#     fading toward the average bed height (fade_target: 0).
#     Without fade, the mesh correction keeps applying forever,
#     which can introduce subtle layer shifts on tall prints.
#
#   zero_reference_position: 120, 120 added
#     Anchors the mesh Z=0 to the same XY point used by
#     auto_z_offset. Both systems now share the same reference
#     frame, preventing them from applying conflicting offsets.
#####################################################################
[bed_mesh]
speed: 150
horizontal_move_z: 3.5
mesh_min: 20, 15
mesh_max: 230, 230
probe_count: 8, 8
algorithm: bicubic
bicubic_tension: 0.2
mesh_pps: 2, 2
fade_start: 0.4
fade_end: 5.0
fade_target: 0
zero_reference_position: 120, 120


#####################################################################
# Probe
# CHANGES vs original:
#   samples: 2 → 3          — third sample catches outliers
#   sample_retract_dist: 0.7 → 2.0 — gives probe spring time to
#                             fully reset between samples, reducing
#                             false readings that shift first-layer Z
#   samples_tolerance: 0.08 → 0.05 — tighter rejection of bad reads
#   samples_tolerance_retries: 3 → 5 — more retries before hard fail
#####################################################################
#!# Pay attention to this section and compare it with your stock backup config
[probe]
pin: !Toolhead:gpio21
x_offset: 17.6
y_offset: 4.4
#z_offset: 1.0             #!# change this to 0 if you get a "Probe triggered prior to movement" error
speed: 5
samples: 3
samples_result: average
sample_retract_dist: 2.0
samples_tolerance: 0.05
samples_tolerance_retries: 5


# Check this for documentation https://github.com/frap129/qidi_auto_z_offset
# IMPORTANT: Run AUTO_Z_CALIBRATE once after setup, verify with a paper test,
#            then SAVE_CONFIG. After that AUTO_Z_LOAD_OFFSET in PRINT_START
#            applies the saved offset automatically every print.
[auto_z_offset]
pin: PC1
# Adjust z_offset for a good first layer:
#   too squished → decrease (e.g. -0.07 → -0.12)
#   too thin/not sticking → increase (e.g. -0.07 → -0.02)
z_offset: -0.05
calibrated_z_offset: -1.00
speed: 13
probe_accel: 50
samples: 5
samples_result: median
samples_tolerance: 0.013
samples_tolerance_retries: 5
offset_samples: 3
prepare_gcode:
   G90
   G0 Z3
   G91
   SET_PIN PIN=bed_sensor VALUE=0
   M204 S10000
   {% set i = 6 %}
   {% for iteration in range(i|int) %}
       G1 Z5 F1200
       G1 Z-5 F1200
   {% endfor %}
   G1 Z3
   G90
   SET_PIN PIN=bed_sensor VALUE=1

[output_pin bed_sensor]
pin: !PA14
pwm: false
shutdown_value: 0
value: 0


#####################################################################
# Heated chamber
#####################################################################
[heater_generic chamber]
heater_pin: PC8
max_power: 1.0
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PA1
control: pid
pid_Kp: 63.418
pid_Ki: 1.342
pid_Kd: 749.125
min_temp: -100
max_temp: 62

[verify_heater chamber]
max_error: 400
check_gain_time: 600
hysteresis: 5
heating_gain: 1


########################################
# Filament sensors
########################################
[filament_switch_sensor filament_tangle_sensor]
switch_pin: PC3
pause_on_runout: True
runout_gcode:
            M118 Filament tangled!
event_delay: 3.0
pause_delay: 0.5

[freedi_hall_filament_width_sensor]
adc1: Toolhead:gpio27
adc2: Toolhead:gpio28
cal_dia1: 1.50
cal_dia2: 2.0
raw_dia1: 14206
raw_dia2: 15278
default_nominal_filament_diameter: 1.75
max_difference: 0.00
measurement_delay: 50
enable: True
measurement_interval: 3
logging: False
min_diameter: 1.00
use_current_dia_while_delay: False
pause_on_runout: True
runout_gcode:
            M118 Filament run out
event_delay: 3.0
pause_delay: 0.5


#####################################################################
# Fans
#####################################################################
[fan]
pin: Toolhead:gpio2
max_power: 1.0
cycle_time: 0.0100
hardware_pwm: false
